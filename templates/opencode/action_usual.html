<div id="oc_chat_container" style="margin:10px;min-height:300px;">
    <div id="ocMessages"></div>
    <div id="ocInputArea">
        <input type="text" id="ocInput" placeholder="<#LANG_OPENCODE_PLACEHOLDER#>" onkeydown="if(event.keyCode==13)ocSendMessage()">
        <button id="ocSendBtn" onclick="ocSendMessage()" class="btn btn-primary"><#LANG_OPENCODE_SEND#></button>
        <button onclick="ocClearHistory()" style="margin-left:5px" class="btn btn-danger"><#LANG_OPENCODE_CLEAR_HISTORY#></button>
    </div>
</div>

<link rel="stylesheet" href="<#ROOTHTML#>templates/opencode/css/opencode.css?v=2">

    clearConfirm: '<#LANG_OPENCODE_CLEAR_CONFIRM#>',
    historyCleared: '<#LANG_OPENCODE_HISTORY_CLEARED#>',
    howCanIHelp: '<#LANG_OPENCODE_HOW_CAN_I_HELP#>',
    connectError: '<#LANG_OPENCODE_CONNECT_ERROR#>',
    serverError: '<#LANG_OPENCODE_SERVER_ERROR#>',
    unknownError: '<#LANG_OPENCODE_UNKNOWN_ERROR#>',
    errorPrefix: '<#LANG_OPENCODE_ERROR_PREFIX#>'
};
</script>
